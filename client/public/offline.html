<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0891b2" />
    <title>Offline - RO Water Supply</title>
  </head>
  <body style="margin:0;background:#f8fafc;color:#0f172a;font-family:Inter,system-ui,sans-serif">
    <main style="min-height:100vh;display:grid;place-items:center;padding:24px">
      <section style="max-width:420px;text-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(15,23,42,.08)">
        <div style="width:64px;height:64px;border-radius:20px;margin:0 auto 18px;background:linear-gradient(135deg,#0891b2,#2563eb);display:grid;place-items:center;color:white;font-size:20px;font-weight:900">RO</div>
        <h1 style="margin:0 0 8px;font-size:24px;color:#020617">You are offline</h1>
        <p style="margin:0 0 20px;color:#475569;line-height:1.6">Reconnect to browse products, checkout, messages, and account updates.</p>
        <button onclick="window.location.reload()" style="border:0;border-radius:14px;background:#0891b2;color:white;font-weight:800;padding:12px 18px">Retry</button>
      </section>
    </main>
  </body>
</html>
